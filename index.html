<!DOCTYPE html>
<html>
<head>
  <title>All In One Shopping</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    h2 {
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      text-align: center;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .card p {
      margin-top: 8px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="header">🛒 All In One Shopping</div>

<h2>🔥 Best Shopping</h2>
<div class="grid">

  <a href="https://www.amazon.in" target="_blank">
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968282.png">
      <p>Amazon</p>
    </div>
  </a>

  <a href="https://www.flipkart.com" target="_blank">
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968149.png">

    </div>
  </a>

  <a href="https://www.myntra.com" target="_blank">

      <p>Myntra</p>
    </div>
  </a>

  <a href="https://www.ajio.com" target="_blank">
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968332.png">
      <p>Ajio</p>
    </div>
  </a>

</div>
