<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AllInOneShopping</title>

  <!-- ✅ Firebase CDN (Correct) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    input, button {
      padding: 12px;
      margin: 10px;
      width: 250px;
    }
  </style>
</head>

<body>

<h2>AllInOneShopping Login</h2>

<input type="tel" id="phone" placeholder="+91XXXXXXXXXX"><br>

<div id="recaptcha-container"></div>

<button onclick="sendOTP()">Send OTP</button>

<br>

<input type="text" id="otp" placeholder="Enter OTP"><br>

<button onclick="verifyOTP()">Verify</button>

<script>
  // ✅ FIXED Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDVOOjp1IeEQ4DMOTCGZV-C0Qi9mMGcenE",
    authDomain: "all-in-one-shopping-726b4.firebaseapp.com",
    projectId: "all-in-one-shopping-726b4",
    storageBucket: "all-in-one-shopping-726b4.appspot.com",
    messagingSenderId: "912464435351",
    appId: "1:912464435351:web:48fea35da31c6adae531d2"
  };

  // ✅ Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  // ✅ Recaptcha
  window.onload = function () {
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      size: 'normal'
    });
  };

  // ✅ Send OTP
  function sendOTP() {
    var phone = document.getElementById("phone").value;

    if (!phone.startsWith("+")) {
      alert("Use +91XXXXXXXXXX format");
      return;
    }

    firebase.auth().signInWithPhoneNumber(phone, window.recaptchaVerifier)
      .then(function (result) {
        window.confirmationResult = result;
        alert("OTP Sent");
      })
      .catch(function (error) {
        alert(error.message);
      });
  }

  // ✅ Verify OTP
  function verifyOTP() {
    var code = document.getElementById("otp").value;

    confirmationResult.confirm(code)
      .then(function () {
        alert("Login Success ✅");
      })
      .catch(function () {
        alert("Wrong OTP ❌");
      });
  }
</script>

</body>
</html>
