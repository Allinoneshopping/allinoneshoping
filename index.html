<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AllInOneShopping</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#f2f2f2;transition:0.3s;}
.header{background:#111;color:#fff;padding:15px;display:flex;justify-content:space-between;}
.logoBox{text-align:center;padding:20px;background:#111;color:#fff;}
.logoBox img{width:90px;border-radius:20px;}
.search{padding:10px;}
.search input{width:100%;padding:12px;border-radius:10px;border:none;}
.card{
background:#fff;margin:10px;padding:15px;border-radius:15px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
transition:0.3s;
}
.card:hover{transform:translateY(-4px);}
.left{display:flex;align-items:center;gap:10px;}
.left img{width:50px;height:50px;border-radius:10px;}
button{
background:#ff4d4d;color:#fff;border:none;padding:10px;
border-radius:10px;cursor:pointer;
}
button:hover{transform:scale(1.05);}
.dark{background:#111;color:#fff;}
.dark .card{background:#222;}
.sideMenu{
position:fixed;top:0;right:-270px;width:260px;height:100%;
background:#111;color:#fff;padding:15px;transition:0.3s;
}
.showMenu{right:0;}
.menuItem{padding:12px;margin:5px 0;border-radius:10px;cursor:pointer;}
.menuItem:hover{background:#222;}
#pageContent{display:none;padding:15px;}
</style>
</head>

<body id="body">

<div class="header">
<span onclick="toggleMenu()">☰</span>
<span onclick="openPage('wallet')">💰</span>
</div>

<div class="logoBox">
<img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
<h2>AllInOneShopping</h2>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search deals...">
</div>

<div id="home"></div>
<div id="pageContent"></div>

<!-- SIDE MENU -->
<div id="sideMenu" class="sideMenu">

<div class="menuItem" onclick="showHome()">🏠 Home</div>
<div class="menuItem" onclick="openPage('profile')">👤 Profile</div>
<div class="menuItem" onclick="openPage('wallet')">💰 Wallet</div>
<div class="menuItem" onclick="openPage('about')">ℹ️ About</div>
<div class="menuItem" onclick="openPage('policy')">🔒 Policy</div>
<div class="menuItem" onclick="openPage('terms')">📄 Terms</div>
<div class="menuItem" onclick="openPage('disclaimer')">⚠️ Disclaimer</div>

<div class="menuItem" onclick="toggleDark()">🎨 Theme</div>
<div class="menuItem" onclick="logout()">🚪 Logout</div>

</div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("sideMenu").classList.toggle("showMenu");
}

/* DARK MODE SAVE */
function toggleDark(){
let body=document.getElementById("body");
body.classList.toggle("dark");
localStorage.setItem("theme", body.classList.contains("dark")?"dark":"light");
}
if(localStorage.getItem("theme")==="dark"){
document.getElementById("body").classList.add("dark");
}

/* AFFILIATE APPS */
let apps=[
{name:"Ajio",logo:"https://upload.wikimedia.org/wikipedia/commons/7/7d/Ajio-Logo.png",link:"https://ajiio.in/RwtcYxm"},
{name:"Fashion Deal",logo:"https://cdn-icons-png.flaticon.com/512/892/892458.png",link:"https://bitli.in/qz4lwKe"},
{name:"Mobile Offer",logo:"https://cdn-icons-png.flaticon.com/512/15/15874.png",link:"https://bitli.in/clexPFd"},
{name:"Electronics",logo:"https://cdn-icons-png.flaticon.com/512/1041/1041372.png",link:"https://bitli.in/Fcx3KOg"},
{name:"Shoes Offer",logo:"https://cdn-icons-png.flaticon.com/512/2589/2589903.png",link:"https://bitli.in/98zKTR3"},
{name:"Grocery",logo:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png",link:"https://bitli.in/XuemaUj"},
{name:"Watch",logo:"https://cdn-icons-png.flaticon.com/512/992/992700.png",link:"https://bitli.in/34cWvhK"},
{name:"Bag Deal",logo:"https://cdn-icons-png.flaticon.com/512/1046/1046857.png",link:"https://bitli.in/dz1xeZc"},
{name:"Beauty",logo:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png",link:"https://bitli.in/eg02XP7"},
{name:"Laptop",logo:"https://cdn-icons-png.flaticon.com/512/1792/1792890.png",link:"https://bitli.in/rlW8Wfx"},
{name:"Special Offer",logo:"https://cdn-icons-png.flaticon.com/512/3135/3135715.png",link:"https://bitli.in/72SeH74"}
];

/* LOAD */
function loadApps(){
let html="";
apps.forEach(app=>{
html+=`
<div class="card">
<div class="left">
<img src="${app.logo}">
<span>${app.name}</span>
</div>
<button onclick="go('${app.link}')">Open</button>
</div>`;
});
document.getElementById("home").innerHTML=html;
}
loadApps();

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"flex":"none";
});
});

/* OPEN LINK */
function go(url){
window.open(url,"_blank");
}

/* HOME */
function showHome(){
document.getElementById("home").style.display="block";
document.getElementById("pageContent").style.display="none";
}

/* PAGES */
function openPage(type){
document.getElementById("home").style.display="none";
let page=document.getElementById("pageContent");
page.style.display="block";

let content="";

if(type=="profile"){
content=`<h2>Profile</h2><p>Name: User</p><p>Phone: Not Set</p>`;
}

if(type=="wallet"){
content=`<h2>Wallet</h2><p><b>Balance:</b> ₹0</p>`;
}

if(type=="about"){
content=`<h2>About</h2><p>This app provides affiliate shopping deals from third-party platforms.</p>`;
}

if(type=="policy"){
content=`<h2>Privacy Policy</h2><p>No personal data is collected. External sites may collect data.</p>`;
}

if(type=="terms"){
content=`<h2>Terms</h2><p>We are not responsible for third-party products, delivery, or payments.</p>`;
}

if(type=="disclaimer"){
content=`<h2>Disclaimer</h2><p>This app uses affiliate links. We may earn commission. We are not responsible for any loss.</p>`;
}

page.innerHTML=content;
document.getElementById("sideMenu").classList.remove("showMenu");
}

/* LOGOUT */
function logout(){
alert("Logout success");
location.reload();
}

</script>

</body>
</html>
