<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AllInOneShopping</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{background:#f2f2f2;}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOGO */
.logoBox{
text-align:center;
padding:20px;
background:#111;
color:#fff;
}
.logoBox img{
width:100px;
border-radius:20px;
}
.logoBox h2{
margin-top:10px;
}

/* SEARCH */
.search{padding:10px;}
.search input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
}

/* CARD */
.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.left{display:flex;align-items:center;gap:10px;}
.left img{width:50px;border-radius:12px;}

button{
background:#ff4d4d;
color:#fff;
border:none;
padding:10px 15px;
border-radius:10px;
}

/* DARK */
.dark{background:#111;color:#fff;}
.dark .card{background:#222;}

/* SIDE MENU */
.sideMenu{
position:fixed;
top:0;
right:-280px;
width:260px;
height:100%;
background:#111;
color:#fff;
padding:15px;
transition:0.3s;
z-index:999;
}

.showMenu{right:0;}

.profileBox{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}
.profileBox img{
width:50px;
border-radius:50%;
}

.menuItem{
padding:12px;
border-radius:10px;
margin:5px 0;
cursor:pointer;
}
.menuItem:hover{background:#222;}

hr{border:0.5px solid #333;margin:10px 0;}
</style>
</head>

<body id="body">

<!-- HEADER -->
<div class="header">
<span onclick="toggleMenu()">☰</span>
</div>

<!-- LOGO -->
<div class="logoBox">
<img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
<h2>AllInOneShopping</h2>
</div>

<!-- SEARCH -->
<div class="search">
<input type="text" id="search" placeholder="Search...">
</div>

<!-- HOME -->
<div id="home"></div>

<!-- SIDE MENU -->
<div id="sideMenu" class="sideMenu">

<div class="profileBox">
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
<div>
<h3>Profile</h3>
<p>View your profile</p>
</div>
</div>

<hr>

<div class="menuItem" onclick="showHome()">🏠 Home</div>
<div class="menuItem" onclick="openPage('profile')">👤 Profile</div>
<div class="menuItem" onclick="openPage('wallet')">💰 Wallet</div>
<div class="menuItem" onclick="openPage('about')">ℹ️ About</div>
<div class="menuItem" onclick="openPage('policy')">🔒 Policy</div>
<div class="menuItem" onclick="openPage('terms')">📄 Terms</div>

<hr>

<div class="menuItem" onclick="toggleDark()">🎨 Theme</div>
<div class="menuItem" onclick="logout()">🚪 Logout</div>

</div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("sideMenu").classList.toggle("showMenu");
}

/* DARK MODE */
function toggleDark(){
document.getElementById("body").classList.toggle("dark");
}

/* DATA */
let apps=[
{name:"Amazon",logo:"https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg",link:"https://www.amazon.in"},
{name:"Flipkart",logo:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Flipkart_logo.png",link:"https://www.flipkart.com"},
{name:"Myntra",logo:"https://upload.wikimedia.org/wikipedia/commons/7/73/Myntra_Logo.png",link:"https://www.myntra.com"},
{name:"Zomato",logo:"https://upload.wikimedia.org/wikipedia/commons/7/75/Zomato_logo.png",link:"https://www.zomato.com"}
];

/* LOAD */
function loadApps(){
let html="";
apps.forEach(app=>{
html+=`
<div class="card">
<div class="left">
<img src="${app.logo}">
<span>${app.name}</span>
</div>
<button onclick="go('${app.link}')">Open</button>
</div>`;
});
document.getElementById("home").innerHTML=html;
}
loadApps();

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"flex":"none";
});
});

/* OPEN */
function go(url){window.location.href=url;}

/* HOME */
function showHome(){loadApps();}

/* PAGES */
function openPage(type){
let content="";

if(type=="profile"){
content=`<h2>Profile</h2><p>User profile info</p>`;
}
if(type=="wallet"){
content=`<h2>Wallet</h2><p>Balance: ₹0</p>`;
}
if(type=="about"){
content=`<h2>About</h2><p>Affiliate shopping app</p>`;
}
if(type=="policy"){
content=`<h2>Policy</h2><p>No personal data collected</p>`;
}
if(type=="terms"){
content=`<h2>Terms</h2><p>Use at your own risk</p>`;
}

document.getElementById("home").innerHTML=content;
}

/* LOGOUT */
function logout(){
alert("Logout success");
location.reload();
}

</script>

</body>
</html>
