<!DOCTYPE html>
<html>
<head>
  <title>All In One Shopping</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      padding: 20px;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #ffc107;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 60px;
      height: 60px;
    }

    .logos {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .logos img {
      width: 80px;
      margin: auto;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login" class="container">
  <h1>Account Login</h1>

  <input type="text" placeholder="Enter Phone Number">
  <input type="password" placeholder="Enter Password">

  <button class="btn" onclick="login()">Log In</button>
</div>

<!-- HOME PAGE -->
<div id="home" class="container hidden">

  <h2>🔥 Best Shopping</h2>
  <div class="grid">

    <a href="https://www.amazon.in" target="_blank">
      <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968282.png">
        <p>Amazon</p>
      </div>
    </a>

    <a href="https://www.flipkart.com" target="_blank">
      <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968149.png">
        <p>Flipkart</p>
      </div>
    </a>

  </div>

  <h2>🍔 Food</h2>
  <div class="grid">

    <a href="https://www.zomato.com" target="_blank">
      <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968280.png">
        <p>Zomato</p>
      </div>
    </a>

    <a href="https://www.swiggy.com" target="_blank">
      <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
        <p>Swiggy</p>
      </div>
    </a>

  </div>

  <h2>🌐 Affiliate Networks</h2>
  <div class="logos">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/ClickBank_logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Awin_logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Rakuten_Global_Brand_Logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Impact_logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/ShareASale_logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Partnerize_logo.png">
  </div>

</div>

<script>
function login(){
  document.getElementById("login").style.display="none";
  document.getElementById("home").style.display="block";
}
</script>

</body>
</html>
