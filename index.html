<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllInOneShopping</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f7f6; }
.header { background:#1e3c72; color:#fff; padding:15px; text-align:center; }
.page { display:none; padding:15px; }
.active { display:block; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.card { background:#fff; padding:15px; border-radius:10px; text-align:center; text-decoration:none; color:#333; }
.nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#fff; padding:10px; border-top:1px solid #ccc; }
button { width:100%; padding:12px; margin-top:10px; background:#1e3c72; color:#fff; border:none; border-radius:8px; }
input { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
</style>
</head>

<body>

<div class="header">AllInOneShopping</div>

<!-- LOGIN -->
<div id="login" class="page active">
<h3>Login with Phone</h3>
<input type="tel" id="phone" placeholder="+91XXXXXXXXXX">
<div id="recaptcha"></div>
<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none;">
<input type="text" id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">
<h3>Shopping</h3>
<div class="grid">
<a href="https://flipkart.com" class="card">Flipkart</a>
<a href="https://amazon.in" class="card">Amazon</a>
<a href="https://myntra.com" class="card">Myntra</a>
<a href="https://ajio.com" class="card">Ajio</a>
</div>

<h3>Food</h3>
<div class="grid">
<a href="https://zomato.com" class="card">Zomato</a>
<a href="https://swiggy.com" class="card">Swiggy</a>
</div>
</div>

<!-- NAV -->
<div id="nav" class="nav" style="display:none;">
<div onclick="show('home')">Home</div>
<div onclick="logout()">Logout</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDVOOjp1IeEQ4DMOTCGZV-C0Qi9mMGcenE",
  authDomain: "all-in-one-shopping-726b4.firebaseapp.com",
  projectId: "all-in-one-shopping-726b4",
  storageBucket: "all-in-one-shopping-726b4.appspot.com",
  messagingSenderId: "912464435351",
  appId: "1:912464435351:web:48fea35da31c6adae531d2"
};

firebase.initializeApp(firebaseConfig);

window.onload = function() {
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
    size: 'invisible'
  });
};

function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function sendOTP(){
let phone=document.getElementById('phone').value;

firebase.auth().signInWithPhoneNumber(phone, window.recaptchaVerifier)
.then(res=>{
window.confirmationResult=res;
document.getElementById('otpBox').style.display='block';
alert("OTP Sent");
})
.catch(err=>alert(err.message));
}

function verifyOTP(){
let code=document.getElementById('otp').value;

confirmationResult.confirm(code)
.then(()=>{
alert("Login Success");
show('home');
document.getElementById('nav').style.display='flex';
})
.catch(()=>alert("Wrong OTP"));
}

function logout(){
location.reload();
}
</script>

</body>
</html>
