<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllInOneShopping</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#222;
  color:#fff;
}

.menu {
  font-size:22px;
  cursor:pointer;
}

/* Sidebar */
.sidebar {
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#333;
  color:#fff;
  padding:20px;
  transition:0.3s;
}

.sidebar a {
  display:block;
  color:#fff;
  margin:15px 0;
  text-decoration:none;
}

/* Search */
.search-box {
  margin:20px;
}

.search-box input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* Cards */
.container {
  padding:10px;
}

.card {
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
  display:flex;
  align-items:center;
  gap:10px;
}

.card img {
  width:40px;
}

button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff6b6b;
  color:#fff;
  cursor:pointer;
}

/* Profile Modal */
.profile {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000aa;
}

.profile-box {
  background:#fff;
  margin:100px auto;
  padding:20px;
  width:80%;
  border-radius:15px;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
  <h2>Menu</h2>
  <a href="#">👤 Profile</a>
  <a href="#">💰 Wallet</a>
  <a href="#">🛒 Orders</a>
  <a href="#">📍 Live Tracking</a>
  <a href="#">⚙️ Settings</a>
  <a href="#">📄 About Us</a>
  <a href="#">🔐 Privacy Policy</a>
  <a href="#">📜 Terms</a>
</div>

<!-- Header -->
<div class="header">
  <span class="menu" onclick="toggleMenu()">☰</span>
  <h2>AllInOneShopping</h2>
  <span onclick="openProfile()">👤</span>
</div>

<!-- Search -->
<div class="search-box">
  <input type="text" id="search" placeholder="Search products...">
</div>

<!-- Products -->
<div class="container" id="products">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/888/888857.png">
<span>Amazon</span>
<button onclick="go('https://www.amazon.in')">Open</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png">
<span>Flipkart</span>
<button onclick="go('https://www.flipkart.com')">Open</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
<span>Myntra</span>
<button onclick="go('https://www.myntra.com')">Open</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
<span>Zomato</span>
<button onclick="go('https://www.zomato.com')">Open</button>
</div>

</div>

<!-- Profile -->
<div id="profile" class="profile">
  <div class="profile-box">
    <h3>My Profile</h3>
    <input type="text" placeholder="Name"><br><br>
    <input type="password" placeholder="Change Password"><br><br>
    <button>Save</button>
    <button onclick="closeProfile()">Close</button>
  </div>
</div>

<script>
function toggleMenu(){
  let s = document.getElementById("sidebar");
  s.style.left = (s.style.left=="0px") ? "-250px" : "0px";
}

function go(url){
  window.location.href = url;
}

function openProfile(){
  document.getElementById("profile").style.display="block";
}

function closeProfile(){
  document.getElementById("profile").style.display="none";
}

/* Search */
document.getElementById("search").addEventListener("keyup", function(){
  let filter = this.value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(filter) ? "flex" : "none";
  });
});
</script>

</body>
</html>
