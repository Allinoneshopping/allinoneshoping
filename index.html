<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AllInOneShopping</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f2f2f2;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOGIN */
.login{
padding:20px;
}
.login input{
width:100%;
margin:10px 0;
padding:12px;
border-radius:10px;
border:none;
}
.login button{
width:100%;
padding:12px;
background:#ff4d4d;
color:#fff;
border:none;
border-radius:10px;
}

/* APP */
.app{
display:none;
}

/* SEARCH */
.search{
padding:10px;
}
.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* CARD */
.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.left{
display:flex;
gap:10px;
align-items:center;
}
.left img{
width:40px;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
background:#ff4d4d;
color:#fff;
}

/* DARK MODE */
.dark{
background:#111;
color:#fff;
}
.dark .card{
background:#222;
color:#fff;
}

/* MENU */
.menu{
padding:10px;
display:flex;
gap:5px;
flex-wrap:wrap;
}
.menu button{
flex:1;
}
</style>
</head>

<body id="body">

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>Login</h2>
<input type="text" id="phone" placeholder="Phone Number">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="header">
<h3>AllInOneShopping</h3>
<div>
<span onclick="toggleDark()">🌙</span>
<span onclick="logout()">🚪</span>
</div>
</div>

<!-- MENU -->
<div class="menu">
<button onclick="showHome()">Home</button>
<button onclick="openPage('about')">About</button>
<button onclick="openPage('policy')">Policy</button>
<button onclick="openPage('terms')">Terms</button>
</div>

<!-- SEARCH -->
<div class="search">
<input type="text" id="search" placeholder="Search...">
</div>

<!-- CONTENT -->
<div id="content">

<!-- HOME -->
<div id="home">

<div class="card">
<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/888/888857.png">
<span>Amazon</span>
</div>
<button onclick="go('https://www.amazon.in')">Open</button>
</div>

<div class="card">
<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png">
<span>Flipkart</span>
</div>
<button onclick="go('https://www.flipkart.com')">Open</button>
</div>

<div class="card">
<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
<span>Myntra</span>
</div>
<button onclick="go('https://www.myntra.com')">Open</button>
</div>

<div class="card">
<div class="left">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
<span>Zomato</span>
</div>
<button onclick="go('https://www.zomato.com')">Open</button>
</div>

</div>

</div>

</div>

<script>
/* LOGIN */
function login(){
let p=document.getElementById("phone").value;
let pass=document.getElementById("pass").value;

if(p && pass){
localStorage.setItem("user",p);
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
}else{
alert("Enter details");
}
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* DARK MODE */
function toggleDark(){
document.getElementById("body").classList.toggle("dark");
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(v) ? "flex":"none";
});
});

/* OPEN LINK */
function go(url){
window.location.href=url;
}

/* HOME */
function showHome(){
location.reload();
}

/* PAGES */
function openPage(type){
let content="";

if(type=="about"){
content=`<h2>About Us</h2>
<p>This app provides access to multiple shopping platforms.</p>
<p>We do not sell products directly.</p>
<p>We may earn commission through affiliate links.</p>`;
}

if(type=="policy"){
content=`<h2>Privacy Policy</h2>
<p>We do not collect personal sensitive data.</p>
<p>Third-party ads may collect anonymous data.</p>`;
}

if(type=="terms"){
content=`<h2>Terms & Conditions</h2>
<p>We are not responsible for products or delivery.</p>
<p>All transactions happen on third-party sites.</p>`;
}

document.getElementById("content").innerHTML=content;
}
</script>

</body>
</html>
