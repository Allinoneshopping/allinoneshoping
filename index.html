<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllInOneShopping</title>

<!-- ✅ FIXED Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body{font-family:sans-serif;background:#f4f7f6;margin:0}
.header{background:#1e3c72;color:#fff;padding:15px;text-align:center;font-weight:bold}
.page{display:none;padding:15px}
.active{display:block}
.main-btn{width:100%;padding:12px;background:#1e3c72;color:#fff;border:none;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<div class="header">AllInOneShopping</div>

<div id="login-page" class="page active">
<h2>Login</h2>
<input type="tel" id="phone" placeholder="+91XXXXXXXXXX" style="width:100%;padding:10px;">
<div id="recaptcha-container"></div>
<button class="main-btn" onclick="sendOTP()">SEND OTP</button>

<div id="otp-area" style="display:none;">
<input type="text" id="otp" placeholder="Enter OTP" style="width:100%;padding:10px;">
<button class="main-btn" onclick="verifyOTP()">VERIFY</button>
</div>
</div>

<div id="home-page" class="page">
<h2>Login Successful 🎉</h2>
</div>

<script>
/* ✅ FIXED Firebase Config */
var firebaseConfig = {
  apiKey: "AIzaSyDVOOjp1IeeQ4DMOTCGZV-C8QI9mMGcenE",
  authDomain: "all-in-one-shopping-726b4.firebaseapp.com",
  projectId: "all-in-one-shopping-726b4",
  storageBucket: "all-in-one-shopping-726b4.appspot.com",
  messagingSenderId: "912464435351",
  appId: "1:912464435351:web:48fea35da31c6adae531d2"
};

firebase.initializeApp(firebaseConfig);

/* ✅ reCAPTCHA INIT */
window.onload = function () {
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
};

/* ✅ SEND OTP */
function sendOTP() {
  var number = document.getElementById('phone').value;

  firebase.auth().signInWithPhoneNumber(number, window.recaptchaVerifier)
  .then(function (confirmationResult) {
    window.confirmationResult = confirmationResult;
    document.getElementById('otp-area').style.display = 'block';
    alert("OTP Sent!");
  })
  .catch(function (error) {
    alert(error.message);
  });
}

/* ✅ VERIFY OTP */
function verifyOTP() {
  var code = document.getElementById('otp').value;

  confirmationResult.confirm(code).then(function () {
    document.getElementById('login-page').style.display = "none";
    document.getElementById('home-page').style.display = "block";
  }).catch(function () {
    alert("Wrong OTP");
  });
}
</script>

</body>
</html>
