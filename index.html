<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AllInOneShopping</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#f2f2f2;
}

/* LOGIN */
.login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:20px;
}
.login input{
margin:10px 0;
padding:14px;
border:none;
border-radius:12px;
}
.login button{
padding:14px;
background:#ff4d4d;
color:#fff;
border:none;
border-radius:12px;
}

/* APP */
.app{
display:none;
min-height:100vh;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

/* SIDE MENU */
.sideMenu{
position:fixed;
top:0;
right:-220px;
width:200px;
height:100%;
background:#111;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
transition:0.3s;
z-index:999;
}

.sideMenu button{
background:#ff4d4d;
color:#fff;
padding:12px;
border:none;
border-radius:10px;
}

/* SHOW MENU */
.showMenu{
right:0;
}

/* SEARCH */
.search{
padding:10px;
}
.search input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
}

/* CARD */
.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 10px rgba(0,0,0,0.08);
}

.left{
display:flex;
gap:12px;
align-items:center;
}
.left img{
width:50px;
height:50px;
border-radius:12px;
}

/* BUTTON */
button{
padding:10px 15px;
border:none;
border-radius:12px;
background:#ff4d4d;
color:#fff;
font-weight:bold;
}

/* DARK MODE */
.dark{
background:#111;
color:#fff;
}
.dark .card{
background:#222;
}

/* CONTENT */
#content{
padding:10px;
}
</style>
</head>

<body id="body">

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>Login</h2>
<input type="text" id="phone" placeholder="Phone Number">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="header">
<h3>AllInOneShopping</h3>
<div>
<span onclick="toggleDark()">🌙</span>
<span onclick="toggleMenu()">☰</span>
</div>
</div>

<!-- SIDE MENU -->
<div id="sideMenu" class="sideMenu">
<button onclick="showHome()">Home</button>
<button onclick="openPage('about')">About</button>
<button onclick="openPage('policy')">Policy</button>
<button onclick="openPage('terms')">Terms</button>
<button onclick="logout()">Logout</button>
</div>

<!-- SEARCH -->
<div class="search">
<input type="text" id="search" placeholder="Search...">
</div>

<!-- CONTENT -->
<div id="content">

<div id="home">

<!-- AMAZON -->
<div class="card">
<div class="left">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
<span>Amazon</span>
</div>
<button onclick="go('https://www.amazon.in')">Open</button>
</div>

<!-- FLIPKART -->
<div class="card">
<div class="left">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Flipkart_logo.png">
<span>Flipkart</span>
</div>
<button onclick="go('https://www.flipkart.com')">Open</button>
</div>

<!-- MYNTRA -->
<div class="card">
<div class="left">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/73/Myntra_Logo.png">
<span>Myntra</span>
</div>
<button onclick="go('https://www.myntra.com')">Open</button>
</div>

<!-- ZOMATO -->
<div class="card">
<div class="left">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/75/Zomato_logo.png">
<span>Zomato</span>
</div>
<button onclick="go('https://www.zomato.com')">Open</button>
</div>

</div>

</div>

</div>

<script>

/* LOGIN */
function login(){
let p=document.getElementById("phone").value;
let pass=document.getElementById("pass").value;

if(p && pass){
localStorage.setItem("user",p);
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
}else{
alert("Enter details");
}
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* DARK MODE */
function toggleDark(){
document.getElementById("body").classList.toggle("dark");
}

/* MENU */
function toggleMenu(){
document.getElementById("sideMenu").classList.toggle("showMenu");
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(v) ? "flex":"none";
});
});

/* OPEN LINK */
function go(url){
window.location.href=url;
}

/* HOME */
function showHome(){
location.reload();
}

/* PAGES */
function openPage(type){
let content="";

if(type=="about"){
content=`<h2>About Us</h2>
<p>This app provides access to multiple shopping platforms.</p>
<p>We may earn commission from affiliate links.</p>`;
}

if(type=="policy"){
content=`<h2>Privacy Policy</h2>
<p>We do not collect personal sensitive data.</p>`;
}

if(type=="terms"){
content=`<h2>Terms & Conditions</h2>
<p>All purchases happen on third-party websites.</p>`;
}

document.getElementById("content").innerHTML=content;
}
</script>

</body>
</html>
